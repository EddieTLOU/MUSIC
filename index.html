<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #ff0000;
            --black: #000000;
        }

        /* HARD FORCED COLORS */
        html, body {
            background-color: var(--black) !important;
            color: var(--neon);
            font-family: 'Schoolbell', cursive;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Scanlines */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes shake {
            0% { transform: translate(0); }
            25% { transform: translate(-3px, 2px); }
            75% { transform: translate(3px, -2px); }
            100% { transform: translate(0); }
        }

        .container { 
            background-color: var(--black);
            text-align: center; 
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .page { display: none; width: 100%; }
        .active { display: flex; flex-direction: column; align-items: center; }

        h1 { 
            font-size: 5rem; 
            text-shadow: 0 0 20px var(--neon);
            animation: shake 0.4s infinite;
            margin-bottom: 20px;
        }
        
        .menu-btn {
            background: var(--black);
            border: 5px solid var(--neon);
            color: var(--neon);
            padding: 20px;
            font-size: 2.5rem;
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            margin: 15px;
            width: 80%;
            max-width: 500px;
            box-shadow: 10px 10px 0px #4a0000;
            transition: 0.1s;
        }

        .menu-btn:active {
            transform: scale(0.9);
            background: var(--neon);
            color: var(--black);
        }

        .sub-text { font-size: 1.3rem; display: block; color: #880000; }

        /* PLAYER VIEW */
        #player { background: var(--black); position: fixed; top: 0; left: 0; z-index: 50; }
        .big-btn {
            background: none; border: none; cursor: pointer;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .big-btn img.cover {
            width: 85vw; max-width: 500px;
            border: 6px solid var(--neon);
            filter: drop-shadow(0 0 30px var(--neon));
        }

        /* THE PAUSE IMAGE */
        .pause-img {
            position: absolute;
            width: 150px; /* Adjust size of your pause icon */
            height: 150px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 60;
        }

        .paused .pause-img { opacity: 1; }
        .paused img.cover { filter: brightness(0.2) grayscale(1); }
    </style>
</head>
<body>

<div class="container">
    
    <!-- PAGE 1: HOME -->
    <div id="home" class="page active">
        <h1>MUSIC</h1>
        <button class="menu-btn" onclick="goTo('artists')">START SYSTEM</button>
    </div>

    <!-- PAGE 2: ARTISTS -->
    <div id="artists" class="page">
        <h1>ARTISTS</h1>
        <button class="menu-btn" onclick="goTo('gorillaz')">GORILLAZ</button>
        <button class="menu-btn" style="border-color:#330000; color:#330000; cursor:default;">MORE COMING...</button>
        <br>
        <button onclick="goTo('home')" style="background:none; border:none; color:white; cursor:pointer;">[ BACK TO HOME ]</button>
    </div>

    <!-- PAGE 3: TRACKLIST -->
    <div id="gorillaz" class="page">
        <h1>TRACKS</h1>
        <button class="menu-btn" onclick="setTrack('orangecounty')">
            ORANGE COUNTY
            <span class="sub-text">Album: The Mountain</span>
        </button>
        <button class="menu-btn" onclick="setTrack('feelgood')">
            FEEL GOOD INC
            <span class="sub-text">Album: Demon Days</span>
        </button>
        <button class="menu-btn" onclick="setTrack('clint')">
            CLINT EASTWOOD
            <span class="sub-text">Album: Gorillaz</span>
        </button>
        <br>
        <button onclick="goTo('artists')" style="background:none; border:none; color:white; cursor:pointer;">[ BACK TO ARTISTS ]</button>
    </div>

    <!-- PAGE 4: PLAYER -->
    <div id="player" class="page">
        <div id="p-wrap" class="big-btn" onclick="togglePlay()">
            <img id="dynamic-img" class="cover" src="" alt="ART">
            <!-- Using your pause.png file here -->
            <img src="pause.png" class="pause-img" alt="PAUSE">
        </div>
    </div>

</div>

<script>
    let audio = null;
    let trackPath = "";

    function goTo(id) {
        // KILL SWITCH: Stop music if going to Home or Artist screens
        if (id === 'home' || id === 'artists' || id === 'gorillaz') {
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
                audio = null;
            }
        }
        
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setTrack(slug) {
        window.location.hash = slug;
        loadTrack();
    }

    function loadTrack() {
        const hash = window.location.hash.replace('#', '');
        
        // Handle direct URL/NFC navigation
        if (!hash) { goTo('home'); return; }
        if (hash === 'artists') { goTo('artists'); return; }
        if (hash === 'gorillaz') { goTo('gorillaz'); return; }

        // Start Player
        trackPath = hash + '.mp3';
        document.getElementById('dynamic-img').src = hash + '.png';
        
        if (audio) { audio.pause(); audio = null; }
        document.getElementById('p-wrap').classList.remove('paused');
        goTo('player');
    }

    function togglePlay() {
        if (!audio) { audio = new Audio(trackPath); }
        const wrap = document.getElementById('p-wrap');

        if (audio.paused) {
            audio.play();
            wrap.classList.remove('paused');
        } else {
            audio.pause();
            wrap.classList.add('paused');
        }
    }

    // Listen for hash changes (Back button/NFC taps)
    window.onhashchange = loadTrack;
    window.onload = loadTrack;
</script>

</body>
</html>
